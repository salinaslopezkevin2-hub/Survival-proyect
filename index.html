<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus FPS - Horda Zombie FBX</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #bloqueo {
            position: absolute; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; cursor: pointer; z-index: 20; text-align: center;
        }
        #mira {
            position: absolute; top: 50%; left: 50%;
            width: 14px; height: 14px; border: 2px solid #00ff00;
            border-radius: 50%; transform: translate(-50%, -50%);
            z-index: 10; pointer-events: none;
        }
        #hud {
            position: absolute; bottom: 20px; left: 20px;
            color: #00ff00; font-family: monospace; font-size: 1.5rem;
            text-shadow: 2px 2px #000; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="bloqueo">
        <h1 id="titulo">CARGANDO ARCHIVOS...</h1>
        <p id="instrucciones">Descargando horda zombie, por favor espera.</p>
    </div>
    <div id="mira"></div>
    <div id="hud">ARMA: RIFLE</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "fflate": "https://unpkg.com/fflate@0.8.2/esm/browser.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
        import * as SkeletonUtils from 'three/addons/utils/SkeletonUtils.js';

        // --- ESCENA BÁSICA (Tus configuraciones) ---
        const escena = new THREE.Scene();
        escena.background = new THREE.Color(0x87ceeb);
        escena.fog = new THREE.Fog(0x87ceeb, 0, 70);

        const camara = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderizador = new THREE.WebGLRenderer({ antialias: true });
        renderizador.setSize(window.innerWidth, window.innerHeight);
        renderizador.shadowMap.enabled = true;
        document.body.appendChild(renderizador.domElement);

        escena.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1));
        const sol = new THREE.DirectionalLight(0xffffff, 0.8);
        sol.position.set(10, 20, 10);
        sol.castShadow = true;
        escena.add(sol);

        // --- PISO ---
        const loaderTex = new THREE.TextureLoader();
        const texPiso = loaderTex.load('https://cdn.polyhaven.com/asset_img/primary/rocky_terrain_02.png?height=760&quality=95');
        texPiso.wrapS = texPiso.wrapT = THREE.RepeatWrapping;
        texPiso.repeat.set(20, 20);
        const piso = new THREE.Mesh(new THREE.PlaneGeometry(120, 120), new THREE.MeshStandardMaterial({ map: texPiso }));
        piso.rotation.x = -Math.PI / 2;
        piso.receiveShadow = true;
        escena.add(piso);

        // --- VARIABLES DEL JUEGO ---
        let mezcladorIdle, mezcladorRun;
        let modeloIdle, modeloRun;
        let enemigos = [];
        const reloj = new THREE.Clock();
        const fbxLoader = new FBXLoader();
        let juegoListo = false;

        const controles = new PointerLockControls(camara, document.body);
        const pantallaBloqueo = document.getElementById('bloqueo');
        const titulo = document.getElementById('titulo');
        const instrucciones = document.getElementById('instrucciones');

        pantallaBloqueo.addEventListener('click', () => { if(juegoListo) controles.lock(); });
        controles.addEventListener('lock', () => pantallaBloqueo.style.display = 'none');
        controles.addEventListener('unlock', () => pantallaBloqueo.style.display = 'flex');

        const teclas = { w:false, a:false, s:false, d:false };
        let velY = 0, enSuelo = true;

        document.addEventListener('keydown', e => {
            if(teclas.hasOwnProperty(e.key.toLowerCase())) teclas[e.key.toLowerCase()] = true;
            if(e.code === 'Space' && enSuelo) { velY = 0.25; enSuelo = false; }
        });
        document.addEventListener('keyup', e => {
            if(teclas.hasOwnProperty(e.key.toLowerCase())) teclas[e.key.toLowerCase()] = false;
        });

        // --- SISTEMA DE CARGA ASÍNCRONA ---
        const cargarFBX = (url) => new Promise((resolve, reject) => fbxLoader.load(url, resolve, undefined, reject));

        async function iniciarJuego() {
            try {
                // 1. Cargar tus Armas
                modeloIdle = await cargarFBX('./Rifle Idle.fbx');
                modeloRun = await cargarFBX('./correr.fbx');
                
                [modeloIdle, modeloRun].forEach(m => {
                    m.scale.set(0.01, 0.01, 0.01);
                    m.traverse(n => { if(n.isMesh) n.castShadow = true; });
                    escena.add(m);
                });
                modeloRun.visible = false;
                
                if(modeloIdle.animations.length) { mezcladorIdle = new THREE.AnimationMixer(modeloIdle); mezcladorIdle.clipAction(modeloIdle.animations[0]).play(); }
                if(modeloRun.animations.length) { mezcladorRun = new THREE.AnimationMixer(modeloRun); mezcladorRun.clipAction(modeloRun.animations[0]).play(); }

                // 2. Cargar Zombies
                const datosZombies = [];
                for(let i=1; i<=3; i++) {
                    instrucciones.innerText = `Descargando Zombie ${i} de 3...`;
                    const w = await cargarFBX(`./z${i}_walk.fbx`);
                    const a = await cargarFBX(`./z${i}_attack.fbx`);
                    const d = await cargarFBX(`./z${i}_death.fbx`);
                    
                    w.scale.set(0.01, 0.01, 0.01);
                    w.traverse(n => { if(n.isMesh) n.castShadow = true; });

                    datosZombies.push({
                        modeloBase: w,
                        animaciones: { walk: w.animations[0], attack: a.animations[0], death: d.animations[0] }
                    });
                }

                // 3. Crear 15 Zombies en el mapa
                for(let i=0; i<15; i++) {
                    const tipoElegido = datosZombies[Math.floor(Math.random() * datosZombies.length)];
                    const clonMesh = SkeletonUtils.clone(tipoElegido.modeloBase);
                    
                    clonMesh.position.set((Math.random() - 0.5) * 90, 0, (Math.random() - 0.5) * 90);
                    clonMesh.radioH = 1.3; // Tu colisión original
                    escena.add(clonMesh);

                    const mixer = new THREE.AnimationMixer(clonMesh);
                    const acciones = {
                        walk: mixer.clipAction(tipoElegido.animaciones.walk),
                        attack: mixer.clipAction(tipoElegido.animaciones.attack),
                        death: mixer.clipAction(tipoElegido.animaciones.death)
                    };

                    acciones.death.setLoop(THREE.LoopOnce);
                    acciones.death.clampWhenFinished = true;
                    acciones.walk.play();

                    enemigos.push({
                        mesh: clonMesh, mixer: mixer, acciones: acciones, estado: 'walk',
                        cambiarEstado: function(nuevoEstado) {
                            if(this.estado === nuevoEstado || this.estado === 'dead') return;
                            this.acciones[this.estado].fadeOut(0.2);
                            this.acciones[nuevoEstado].reset().fadeIn(0.2).play();
                            this.estado = nuevoEstado;
                        }
                    });
                }

                titulo.innerText = "NEXUS FPS";
                instrucciones.innerText = "CLIC PARA COMBATIR";
                juegoListo = true;

            } catch (error) {
                console.error(error);
                titulo.innerText = "ERROR AL CARGAR";
                instrucciones.innerText = "Revisa los nombres de los archivos en GitHub.";
            }
        }
        iniciarJuego();

        // --- DISPARO A ZOMBIES ---
        const ray = new THREE.Raycaster();
        window.addEventListener('mousedown', () => {
            if(!controles.isLocked || !juegoListo) return;
            ray.setFromCamera(new THREE.Vector2(0, 0), camara);
            
            const meshesVivos = enemigos.filter(z => z.estado !== 'dead').map(z => z.mesh);
            const hits = ray.intersectObjects(meshesVivos, true); 
            
            if(hits.length > 0) {
                let objetivo = hits[0].object;
                while(objetivo.parent && objetivo.parent.type !== 'Scene') { objetivo = objetivo.parent; }

                const zombieAtacado = enemigos.find(z => z.mesh === objetivo);
                if(zombieAtacado) {
                    zombieAtacado.cambiarEstado('dead');
                }
            }
        });

        // --- BUCLE DE ANIMACIÓN ---
        function animar() {
            requestAnimationFrame(animar);
            const delta = reloj.getDelta();
            
            if(mezcladorIdle) mezcladorIdle.update(delta);
            if(mezcladorRun) mezcladorRun.update(delta);

            if(controles.isLocked && juegoListo) {
                const prevPos = camara.position.clone();
                const moviendose = teclas.w || teclas.s || teclas.a || teclas.d;

                // Tus velocidades originales
                if(teclas.w) controles.moveForward(0.15);
                if(teclas.s) controles.moveForward(-0.15);
                if(teclas.a) controles.moveRight(-0.12);
                if(teclas.d) controles.moveRight(0.12);

                camara.position.y += velY;
                if(!enSuelo) velY -= 0.015;
                if(camara.position.y <= 1.6) { camara.position.y = 1.6; velY = 0; enSuelo = true; }

                // Tu posición original del arma
                if(modeloIdle && modeloRun) {
                    const euler = new THREE.Euler(0,0,0,'YXZ').setFromQuaternion(camara.quaternion);
                    const offset = new THREE.Vector3(0.5, -1.6, -2.5).applyAxisAngle(new THREE.Vector3(0,1,0), euler.y);
                    const finalPos = camara.position.clone().add(offset);

                    modeloIdle.position.copy(finalPos); modeloIdle.rotation.y = euler.y + Math.PI;
                    modeloRun.position.copy(finalPos); modeloRun.rotation.y = euler.y + Math.PI;

                    modeloIdle.visible = !moviendose || !enSuelo;
                    modeloRun.visible = moviendose && enSuelo;

                    // Colisiones con los zombies vivos
                    for(let z of enemigos) {
                        if(z.estado === 'dead') continue;
                        const dist = modeloIdle.position.distanceTo(new THREE.Vector3(z.mesh.position.x, modeloIdle.position.y, z.mesh.position.z));
                        if(dist < z.mesh.radioH) {
                            camara.position.copy(prevPos);
                        }
                    }
                }

                // Inteligencia Zombie
                const posJugador = camara.position.clone();
                posJugador.y = 0; 

                for(let z of enemigos) {
                    z.mixer.update(delta);
                    if(z.estado === 'dead') continue;

                    z.mesh.lookAt(posJugador);
                    const distancia = z.mesh.position.distanceTo(posJugador);

                    if(distancia > 2.5) {
                        z.mesh.translateZ(0.04); 
                        z.cambiarEstado('walk');
                    } else {
                        z.cambiarEstado('attack');
                    }
                }
            }
            renderizador.render(escena, camara);
        }
        animar();

        window.addEventListener('resize', () => {
            camara.aspect = window.innerWidth / window.innerHeight;
            camara.updateProjectionMatrix();
            renderizador.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
