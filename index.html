<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus FPS - v22 (Balance de Daño y Corrección de Spawn)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', Courier, monospace; }
        #menuInicio {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), 
                        url('https://cdn.polyhaven.com/asset_img/primary/aerial_grass_rock.png?height=760&quality=95');
            background-size: cover; display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #00ff00; z-index: 100; text-align: center; text-shadow: 0 0 10px #000;
        }
        #tituloMenu { font-size: 3rem; margin-bottom: 10px; color: #ff3333; text-shadow: 0 0 20px #ff0000; }
        .botonMenu {
            background: rgba(0, 255, 0, 0.1); border: 2px solid #00ff00; color: #00ff00;
            padding: 12px 30px; font-size: 1.2rem; cursor: pointer; margin: 8px;
            transition: all 0.3s; font-family: inherit; font-weight: bold;
        }
        .botonMenu:hover { background: rgba(0, 255, 0, 0.4); box-shadow: 0 0 20px #00ff00; }
        .botonMenu:disabled { opacity: 0.5; cursor: not-allowed; }
        #bloqueo {
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.8);
            display: none; flex-direction: column; justify-content: center; align-items: center;
            color: white; z-index: 20; text-align: center;
        }
        #mira {
            position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; border: 2px solid #ff0000;
            border-radius: 50%; transform: translate(-50%, -50%); z-index: 10; pointer-events: none; display: none;
        }
        #hud {
            position: absolute; bottom: 15px; left: 15px; color: #00ff00; font-size: 1.5rem; display: none;
            text-shadow: 2px 2px #000; font-weight: bold; pointer-events: none;
        }
        #pantallaRoja {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 60%, rgba(255, 0, 0, 0.7) 100%);
            opacity: 0; pointer-events: none; z-index: 5; transition: opacity 0.2s; display: none;
        }
        #mensajeRecarga {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            color: #ffff00; font-size: 1.2rem; font-weight: bold; display: none; text-shadow: 2px 2px 5px #000; z-index: 15;
            pointer-events: none; text-align: center; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 5px;
        }
    </style>
</head>
<body>
    <div id="menuInicio">
        <h1 id="tituloMenu">NEXUS FPS: SURVIVAL</h1>
        <p id="estadoCarga" style="color: #00ff00;">Cargando archivos del juego...</p>
        <button id="btnIniciar" class="botonMenu" disabled>ENTRAR AL BOSQUE</button>
    </div>
    <div id="bloqueo">
        <h1 id="textoPausa">PAUSA</h1>
        <button id="btnContinuar" class="botonMenu">VOLVER AL JUEGO</button>
        <button id="btnSalir" class="botonMenu" style="border-color: red; color: red;">SALIR AL MENÚ</button>
    </div>
    <div id="pantallaRoja"></div>
    <div id="mensajeRecarga">RECARGANDO...</div>
    <div id="mira"></div>
    <div id="hud">
        HP: <span id="uiVida">100</span> | 
        BALAS: <span id="uiBalas" style="color: #ffff00;">30</span>/30 | 
        HORDA: <span id="uiHorda">1</span> | 
        ZOMBIES: <span id="uiZombies">15</span>
        <br><span style="font-size: 0.8rem;">[WASD] Mover | [ESPACIO] Saltar | [F] Linterna | [R] Recargar | [CLICK] Disparar</span>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "fflate": "https://unpkg.com/fflate@0.8.2/esm/browser.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import * as SkeletonUtils from 'three/addons/utils/SkeletonUtils.js';

        const escena = new THREE.Scene();
        escena.background = new THREE.Color(0x0a0a10); 
        escena.fog = new THREE.FogExp2(0x0a0a10, 0.04); 

        const camaraControles = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const camaraRender = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        escena.add(camaraControles); 

        const renderizador = new THREE.WebGLRenderer({ antialias: true });
        renderizador.setSize(window.innerWidth, window.innerHeight);
        renderizador.shadowMap.enabled = true;
        document.body.appendChild(renderizador.domElement);

        escena.add(new THREE.HemisphereLight(0x333344, 0x111118, 0.3)); 
        const luna = new THREE.DirectionalLight(0x555588, 0.2); 
        luna.position.set(20, 50, -20); luna.castShadow = true; escena.add(luna);

        const linterna = new THREE.SpotLight(0xffffff, 0); 
        linterna.angle = Math.PI / 5; linterna.penumbra = 0.3; linterna.distance = 40; linterna.castShadow = true;
        linterna.position.set(0, 0, 0); linterna.target.position.set(0, 0, -1); 
        camaraControles.add(linterna); camaraControles.add(linterna.target);
        let linternaEncendida = false;

        const loaderTex = new THREE.TextureLoader();
        const fbxLoader = new FBXLoader();
        const gltfLoader = new GLTFLoader();
        const cajasColision = []; 

        const texPiso = loaderTex.load('https://cdn.polyhaven.com/asset_img/primary/aerial_grass_rock.png?height=760&quality=95');
        texPiso.wrapS = texPiso.wrapT = THREE.RepeatWrapping; texPiso.repeat.set(30, 30);
        const piso = new THREE.Mesh(new THREE.PlaneGeometry(150, 150), new THREE.MeshStandardMaterial({ map: texPiso, color: 0x444444 }));
        piso.rotation.x = -Math.PI / 2; piso.receiveShadow = true; escena.add(piso);

        const texMuro = loaderTex.load('https://cdn.polyhaven.com/asset_img/primary/castle_brick_broken_06.png?height=512&quality=80');
        texMuro.wrapS = texMuro.wrapT = THREE.RepeatWrapping; texMuro.repeat.set(10, 2);
        const geoMuro = new THREE.BoxGeometry(140, 10, 2);
        const matMuro = new THREE.MeshStandardMaterial({map: texMuro, color: 0x555555});
        const muroNorte = new THREE.Mesh(geoMuro, matMuro); muroNorte.position.set(0, 5, -70); escena.add(muroNorte);
        const muroSur = new THREE.Mesh(geoMuro, matMuro); muroSur.position.set(0, 5, 70); escena.add(muroSur);
        const muroEste = new THREE.Mesh(geoMuro, matMuro); muroEste.position.set(70, 5, 0); muroEste.rotation.y = Math.PI / 2; escena.add(muroEste);
        const muroOeste = new THREE.Mesh(geoMuro, matMuro); muroOeste.position.set(-70, 5, 0); muroOeste.rotation.y = Math.PI / 2; escena.add(muroOeste);

        function generarArboles() {
            const texTronco = loaderTex.load('https://cdn.polyhaven.com/asset_img/primary/bark_brown_02.png?height=512&quality=80');
            texTronco.wrapS = texTronco.wrapT = THREE.RepeatWrapping; texTronco.repeat.set(1, 3);
            const texHojas = loaderTex.load('https://cdn.polyhaven.com/asset_img/primary/leaves_forest_ground.png?height=512&quality=80');
            texHojas.wrapS = texHojas.wrapT = THREE.RepeatWrapping; texHojas.repeat.set(4, 4);

            const geoTronco = new THREE.CylinderGeometry(0.6, 0.8, 4, 8);
            const matTronco = new THREE.MeshStandardMaterial({map: texTronco, color: 0x666666}); 
            const geoHojas = new THREE.ConeGeometry(3, 7, 8);
            const matHojas = new THREE.MeshStandardMaterial({map: texHojas, color: 0x334433}); 

            for(let i=0; i<100; i++) {
                const x = (Math.random() - 0.5) * 130; const z = (Math.random() - 0.5) * 130;
                if(Math.abs(x) < 10 && Math.abs(z) < 10) continue; 
                const tronco = new THREE.Mesh(geoTronco, matTronco); tronco.position.set(x, 2, z); escena.add(tronco);
                const hojas = new THREE.Mesh(geoHojas, matHojas); hojas.position.set(x, 7.5, z); escena.add(hojas);
                cajasColision.push(new THREE.Box3().setFromObject(tronco));
            }
        }
        generarArboles();

        // --- SISTEMA DE HORDAS Y DAÑO BALANCEADO ---
        let jugador = { vida: 100, maxVida: 100 };
        let municion = { actual: 30, maxima: 30, recargando: false }; 
        let sistemaHordas = { 
            nivel: 1, 
            zombiesRestantes: 15, 
            zombiesTotales: 15, 
            multiplicadorVidaZombie: 1, 
            velocidadZombie: 0.07, 
            danoZombie: 5 // <--- DAÑO BASE AJUSTADO A 5
        };
        let datosZombiesGrupales = [];

        let modeloTP; let mixerTP; let accionesTP = {}; 
        let enemigos = [];
        const reloj = new THREE.Clock(); 
        let juegoListo = false; let juegoEmpezado = false; let gameOver = false;

        const controles = new PointerLockControls(camaraControles, document.body);
        
        btnIniciar.addEventListener('click', () => {
            menuInicio.style.display = 'none'; mira.style.display = 'block'; hud.style.display = 'block'; pantallaRoja.style.display = 'block';
            controles.lock(); juegoEmpezado = true;
        });
        
        btnContinuar.addEventListener('click', () => { if(!gameOver) controles.lock(); });
        
        btnSalir.addEventListener('click', () => {
            jugador.vida = 100; municion.actual = municion.maxima; municion.recargando = false;
            // REINICIO DE VALORES POR DEFECTO
            sistemaHordas.nivel = 1; sistemaHordas.zombiesTotales = 15; sistemaHordas.zombiesRestantes = 15;
            sistemaHordas.multiplicadorVidaZombie = 1; sistemaHordas.velocidadZombie = 0.07; sistemaHordas.danoZombie = 5;
            
            enemigos.forEach(z => escena.remove(z.mesh));
            enemigos = [];
            for(let i=0; i<sistemaHordas.zombiesTotales; i++) { crearZombie(datosZombiesGrupales[Math.floor(Math.random() * datosZombiesGrupales.length)]); }
            
            camaraControles.position.set(0, 1.6, 0); 
            gameOver = false; juegoEmpezado = false;
            
            bloqueo.style.display = 'none'; pantallaRoja.style.display = 'none'; mensajeRecarga.style.display = 'none';
            mira.style.display = 'none'; hud.style.display = 'none';
            menuInicio.style.display = 'flex'; textoPausa.innerText = "PAUSA"; textoPausa.style.color = "white";
            btnContinuar.style.display = "inline-block"; estadoCarga.innerText = "¡PREPARADO!";
            actualizarHUD();
        });

        controles.addEventListener('lock', () => bloqueo.style.display = 'none');
        controles.addEventListener('unlock', () => { if(juegoEmpezado) bloqueo.style.display = 'flex'; });

        const teclas = { w:false, a:false, s:false, d:false }; let velY = 0, enSuelo = true;
        
        document.addEventListener('keydown', e => {
            if(!controles.isLocked || !juegoEmpezado || gameOver) return;
            if(teclas.hasOwnProperty(e.key.toLowerCase())) teclas[e.key.toLowerCase()] = true;
            if(e.code === 'Space' && enSuelo) { velY = 0.25; enSuelo = false; }
            if(e.code === 'KeyF') { linternaEncendida = !linternaEncendida; linterna.intensity = linternaEncendida ? 30 : 0; }
            
            if(e.code === 'KeyR' && municion.actual < municion.maxima && !municion.recargando) {
                municion.recargando = true;
                mensajeRecarga.innerText = "RECARGANDO...";
                mensajeRecarga.style.color = "#ffff00";
                mensajeRecarga.style.display = 'block';
                setTimeout(() => {
                    municion.actual = municion.maxima;
                    municion.recargando = false;
                    mensajeRecarga.style.display = 'none';
                    actualizarHUD();
                }, 1500); 
            }
        });
        document.addEventListener('keyup', e => { if(teclas.hasOwnProperty(e.key.toLowerCase())) teclas[e.key.toLowerCase()] = false; });

        function actualizarHUD() {
            uiVida.innerText = Math.max(0, Math.floor(jugador.vida));
            uiHorda.innerText = sistemaHordas.nivel;
            uiZombies.innerText = sistemaHordas.zombiesRestantes;
            uiBalas.innerText = municion.actual;
            if(municion.actual <= 10) uiBalas.style.color = "red"; else uiBalas.style.color = "#ffff00";

            if(jugador.vida <= 0 && !gameOver) {
                gameOver = true; controles.unlock();
                textoPausa.innerText = "¡TE COMIERON!"; textoPausa.style.color = "red";
                btnContinuar.style.display = "none"; bloqueo.style.display = 'flex';
            }
        }

        const cargarFBX = (url) => new Promise((resolve, reject) => { fbxLoader.load(url, resolve, undefined, (err) => reject({url, err})); });

        function crearZombie(tipoElegido) {
            const clonMesh = SkeletonUtils.clone(tipoElegido.modeloBase);
            
            // --- SPAWN INTELIGENTE (NO APARECE ADENTRO DE OBJETOS) ---
            let posX, posZ, tocandoObjeto;
            do {
                posX = (Math.random() - 0.5) * 120;
                posZ = (Math.random() - 0.5) * 120;
                tocandoObjeto = false;
                
                // Evitar generar en un radio de 10 unidades del jugador (para no aparecer en tu cara)
                if(Math.abs(posX) < 10 && Math.abs(posZ) < 10) {
                    tocandoObjeto = true;
                    continue;
                }

                // Revisar si las coordenadas chocan con una caja de colisión
                for(let caja of cajasColision) {
                    if(posX > caja.min.x - 1 && posX < caja.max.x + 1 && 
                       posZ > caja.min.z - 1 && posZ < caja.max.z + 1) {
                        tocandoObjeto = true; 
                        break;
                    }
                }
            } while(tocandoObjeto);

            clonMesh.position.set(posX, 0, posZ);
            escena.add(clonMesh);
            
            const mixer = new THREE.AnimationMixer(clonMesh);
            const acciones = { walk: mixer.clipAction(tipoElegido.animaciones.walk), attack: mixer.clipAction(tipoElegido.animaciones.attack), death: mixer.clipAction(tipoElegido.animaciones.death) };
            acciones.death.setLoop(THREE.LoopOnce); acciones.death.clampWhenFinished = true; acciones.walk.play();
            enemigos.push({
                mesh: clonMesh, mixer: mixer, acciones: acciones, estado: 'walk', vida: 3 * sistemaHordas.multiplicadorVidaZombie,
                ultimoAtaque: 0, 
                cambiarEstado: function(nuevoEstado) {
                    if(this.estado === nuevoEstado || this.estado === 'dead') return;
                    if (nuevoEstado === 'dead') { this.acciones.walk.stop(); this.acciones.attack.stop(); this.acciones.death.reset().play(); }
                    else { this.acciones[this.estado].fadeOut(0.2); this.acciones[nuevoEstado].reset().fadeIn(0.2).play(); }
                    this.estado = nuevoEstado;
                }
            });
        }

        async function iniciarCarga() {
            try {
                estadoCarga.innerText = "Cargando autos y entorno...";
                
                let modeloAutoBase;
                const escalaAuto = 0.1; // <--- ESCALA AJUSTADA PARA TU AUTO
                
                try {
                    const gltfData = await new Promise((resolve, reject) => { gltfLoader.load('./Carro.glb', resolve, undefined, reject); });
                    modeloAutoBase = gltfData.scene;
                    modeloAutoBase.scale.set(escalaAuto, escalaAuto, escalaAuto);
                    modeloAutoBase.traverse(n => { if(n.isMesh) { n.castShadow = true; n.receiveShadow = true; }});
                } catch (e) {
                    console.warn("No se encontró Carro.glb. Cargando caja de metal.");
                    const texMetalCarro = loaderTex.load('https://cdn.polyhaven.com/asset_img/primary/peeling_painted_metal.png?height=512&quality=80');
                    texMetalCarro.wrapS = texMetalCarro.wrapT = THREE.RepeatWrapping; texMetalCarro.repeat.set(2, 2);
                    modeloAutoBase = new THREE.Mesh(new THREE.BoxGeometry(2.5, 1.2, 5), new THREE.MeshStandardMaterial({map: texMetalCarro, color: 0x777777}));
                }

                for(let i=0; i<15; i++) {
                    const x = (Math.random() - 0.5) * 120; const z = (Math.random() - 0.5) * 120;
                    if(Math.abs(x) < 15 && Math.abs(z) < 15) continue; 
                    const autoClon = SkeletonUtils.clone(modeloAutoBase);
                    autoClon.position.set(x, 0, z); 
                    if(!modeloAutoBase.isObject3D) { autoClon.position.y = 0.6; } 
                    autoClon.rotation.y = Math.random() * Math.PI; escena.add(autoClon);
                    cajasColision.push(new THREE.Box3().setFromObject(autoClon));
                }

                estadoCarga.innerText = "Cargando personajes y zombies...";
                const escalaNormal = 0.007; 
                const tpIdleModel = await cargarFBX('./Rifle Idle.fbx');
                const tpRunModel = await cargarFBX('./correr.fbx');
                modeloTP = tpIdleModel;
                modeloTP.scale.set(escalaNormal, escalaNormal, escalaNormal); 
                modeloTP.traverse(n => { if(n.isMesh) n.castShadow = true; }); escena.add(modeloTP);
                
                mixerTP = new THREE.AnimationMixer(modeloTP);
                accionesTP.idle = mixerTP.clipAction(tpIdleModel.animations[0]);
                accionesTP.run = mixerTP.clipAction(tpRunModel.animations[0]); accionesTP.idle.play(); 

                const nombresZombies = [
                    { walk: './Z1_Walk.fbx', attack: './Z1_attack.fbx', death: './Z1_Death.fbx' },
                    { walk: './Z2_Walk.fbx', attack: './Z2_attack.fbx', death: './Z2_Death.fbx' },
                    { walk: './Z3_walk.fbx', attack: './Z3_attack.fbx', death: './Z3-Death.fbx' }
                ];
                for(let i=0; i<nombresZombies.length; i++) {
                    const w = await cargarFBX(nombresZombies[i].walk); const a = await cargarFBX(nombresZombies[i].attack); const d = await cargarFBX(nombresZombies[i].death);
                    w.scale.set(escalaNormal, escalaNormal, escalaNormal);
                    datosZombiesGrupales.push({ modeloBase: w, animaciones: { walk: w.animations[0], attack: a.animations[0], death: d.animations[0] } });
                }
                for(let i=0; i<sistemaHordas.zombiesTotales; i++) { crearZombie(datosZombiesGrupales[Math.floor(Math.random() * datosZombiesGrupales.length)]); }

                estadoCarga.innerText = "¡PREPARADO!"; btnIniciar.disabled = false; juegoListo = true;
            } catch (error) { console.error(error); estadoCarga.innerText = "ERROR AL CARGAR DATOS."; }
        }
        iniciarCarga();

        const ray = new THREE.Raycaster();
        const matDisparo = new THREE.LineBasicMaterial({ color: 0xff0000, linewidth: 3 }); 
        
        window.addEventListener('mousedown', () => {
            if(!controles.isLocked || !juegoListo || !juegoEmpezado || gameOver) return;
            if(municion.recargando) return; 
            if(municion.actual <= 0) {
                mensajeRecarga.innerText = "[ PRESIONA 'R' PARA RECARGAR ]"; mensajeRecarga.style.color = "red"; mensajeRecarga.style.display = "block";
                setTimeout(() => { if(!municion.recargando) mensajeRecarga.style.display = "none"; }, 1000); return;
            }

            municion.actual--; actualizarHUD();
            ray.setFromCamera(new THREE.Vector2(0, 0), camaraRender);
            const objetivoBala = new THREE.Vector3(); ray.ray.at(100, objetivoBala); 
            const hits = ray.intersectObjects(enemigos.filter(z => z.estado !== 'dead').map(z => z.mesh), true); 
            
            if(hits.length > 0) {
                objetivoBala.copy(hits[0].point); let objetivo = hits[0].object;
                while(objetivo.parent && objetivo.parent.type !== 'Scene') { objetivo = objetivo.parent; }
                const zombieAtacado = enemigos.find(z => z.mesh === objetivo);
                if(zombieAtacado) { 
                    zombieAtacado.vida -= 1;
                    if(zombieAtacado.vida <= 0) {
                        zombieAtacado.cambiarEstado('dead'); sistemaHordas.zombiesRestantes--; actualizarHUD();
                        if(sistemaHordas.zombiesRestantes <= 0) {
                            setTimeout(() => { 
                                sistemaHordas.nivel++; 
                                sistemaHordas.zombiesTotales += 5; 
                                sistemaHordas.zombiesRestantes = sistemaHordas.zombiesTotales; 
                                sistemaHordas.multiplicadorVidaZombie += 0.5; 
                                sistemaHordas.velocidadZombie += 0.015; 
                                sistemaHordas.danoZombie += 2; // <--- AUMENTO DE DAÑO EN 2 POR HORDA
                                
                                for(let i=0; i<sistemaHordas.zombiesTotales; i++) { crearZombie(datosZombiesGrupales[Math.floor(Math.random() * datosZombiesGrupales.length)]); } 
                                actualizarHUD(); 
                            }, 3000); 
                        }
                    }
                }
            }
            
            if (modeloTP) {
                const puntoDisparo = new THREE.Vector3(); puntoDisparo.copy(modeloTP.position); puntoDisparo.y += 1.2; 
                const geoDisparo = new THREE.BufferGeometry().setFromPoints([puntoDisparo, objetivoBala]);
                const rastro = new THREE.Line(geoDisparo, matDisparo.clone()); escena.add(rastro);
                setTimeout(() => { escena.remove(rastro); rastro.material.dispose(); geoDisparo.dispose(); }, 80); 
            }
        });

        let estadoTPActual = 'idle';
        function cambiarAnimacionTP(nuevoEstado) {
            if(nuevoEstado === estadoTPActual) return;
            accionesTP[estadoTPActual].fadeOut(0.2); accionesTP[nuevoEstado].reset().fadeIn(0.2).play(); estadoTPActual = nuevoEstado;
        }

        function checarColisionXZ(posicion, radio) {
            const piesY = posicion.y - 1.6;
            let alturaSuelo = 0;
            let choca = false;
            for(let caja of cajasColision) {
                if(posicion.x > caja.min.x - radio && posicion.x < caja.max.x + radio && 
                   posicion.z > caja.min.z - radio && posicion.z < caja.max.z + radio) {
                    if(piesY >= caja.max.y - 0.2) { alturaSuelo = Math.max(alturaSuelo, caja.max.y); } 
                    else { choca = true; }
                }
            }
            return { choca, alturaSuelo };
        }

        function animar() {
            requestAnimationFrame(animar);
            const delta = reloj.getDelta();
            const tiempoActual = reloj.getElapsedTime();
            
            if(juegoEmpezado && !gameOver && controles.isLocked) {
                if(mixerTP) mixerTP.update(delta);

                const moviendose = teclas.w || teclas.s || teclas.a || teclas.d;
                const posOriginalX = camaraControles.position.x;
                const posOriginalZ = camaraControles.position.z;

                if(teclas.w) controles.moveForward(0.15); if(teclas.s) controles.moveForward(-0.15);
                if(teclas.a) controles.moveRight(-0.12); if(teclas.d) controles.moveRight(0.12);

                const nuevaX = camaraControles.position.x;
                const nuevaZ = camaraControles.position.z;

                camaraControles.position.z = posOriginalZ; 
                let colX = checarColisionXZ(camaraControles.position, 0.4);
                if(colX.choca || camaraControles.position.x > 68 || camaraControles.position.x < -68) { camaraControles.position.x = posOriginalX; }

                camaraControles.position.x = nuevaX; 
                camaraControles.position.z = nuevaZ; 
                let colZ = checarColisionXZ(camaraControles.position, 0.4);
                if(colZ.choca || camaraControles.position.z > 68 || camaraControles.position.z < -68) { camaraControles.position.z = posOriginalZ; }
                
                if(colX.choca || camaraControles.position.x > 68 || camaraControles.position.x < -68) { camaraControles.position.x = posOriginalX; }

                let chequeoSuelo = checarColisionXZ(camaraControles.position, 0.4);
                camaraControles.position.y += velY; 
                velY -= 0.015; 

                if(camaraControles.position.y - 1.6 <= chequeoSuelo.alturaSuelo) { 
                    camaraControles.position.y = chequeoSuelo.alturaSuelo + 1.6; velY = 0; enSuelo = true; 
                } else { enSuelo = false; }

                const euler = new THREE.Euler(0,0,0,'YXZ').setFromQuaternion(camaraControles.quaternion);
                camaraRender.position.copy(camaraControles.position);
                camaraRender.quaternion.copy(camaraControles.quaternion);
                camaraRender.translateZ(3.0); camaraRender.position.y += 0.5; 
                
                if(modeloTP) {
                    const posPies = camaraControles.position.clone(); posPies.y = camaraControles.position.y - 1.6; 
                    modeloTP.position.copy(posPies); modeloTP.rotation.y = euler.y + Math.PI; 
                    if(moviendose && enSuelo) cambiarAnimacionTP('run'); else cambiarAnimacionTP('idle');
                }

                const posJugadorLogica = camaraControles.position.clone(); posJugadorLogica.y = 0; 
                let recibiendoDano = false;
                
                for(let z of enemigos) {
                    z.mixer.update(delta); if(z.estado === 'dead') continue;
                    z.mesh.lookAt(posJugadorLogica);
                    const dist3D = z.mesh.position.distanceTo(camaraControles.position);

                    if(dist3D > 2.5) { 
                        const dirZombie = new THREE.Vector3(); z.mesh.getWorldDirection(dirZombie);
                        const zOriX = z.mesh.position.x;
                        z.mesh.position.x += dirZombie.x * sistemaHordas.velocidadZombie;
                        if(checarColisionXZ(z.mesh.position, 0.5).choca) z.mesh.position.x = zOriX;

                        const zOriZ = z.mesh.position.z;
                        z.mesh.position.z += dirZombie.z * sistemaHordas.velocidadZombie;
                        if(checarColisionXZ(z.mesh.position, 0.5).choca) z.mesh.position.z = zOriZ;

                        z.cambiarEstado('walk'); 
                    } else { 
                        z.cambiarEstado('attack'); 
                        if(tiempoActual - z.ultimoAtaque > 1.5) {
                            jugador.vida -= sistemaHordas.danoZombie; 
                            z.ultimoAtaque = tiempoActual;
                            recibiendoDano = true; 
                            actualizarHUD(); 
                        }
                    }
                }
                pantallaRoja.style.opacity = recibiendoDano ? "1" : pantallaRoja.style.opacity > 0 ? (pantallaRoja.style.opacity - 0.05) : "0";
                
                if(municion.actual > 0 && mensajeRecarga.innerText === "[ PRESIONA 'R' PARA RECARGAR ]") { mensajeRecarga.style.display = "none"; }
            }
            renderizador.render(escena, camaraRender);
        }
        animar();

        window.addEventListener('resize', () => { 
            camaraControles.aspect = window.innerWidth / window.innerHeight; camaraControles.updateProjectionMatrix(); 
            camaraRender.aspect = window.innerWidth / window.innerHeight; camaraRender.updateProjectionMatrix(); 
            renderizador.setSize(window.innerWidth, window.innerHeight); 
        });
    </script>
</body>
</html>
