<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus FPS - v13 (Noche y Tercera Persona Real)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', Courier, monospace; }
        #menuInicio {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), 
                        url('https://cdn.polyhaven.com/asset_img/primary/aerial_grass_rock.png?height=760&quality=95');
            background-size: cover; display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #00ff00; z-index: 100; text-align: center; text-shadow: 0 0 10px #000;
        }
        #tituloMenu { font-size: 3rem; margin-bottom: 10px; color: #ff3333; text-shadow: 0 0 20px #ff0000; }
        .botonMenu {
            background: rgba(0, 255, 0, 0.1); border: 2px solid #00ff00; color: #00ff00;
            padding: 12px 30px; font-size: 1.2rem; cursor: pointer; margin: 8px;
            transition: all 0.3s; font-family: inherit; font-weight: bold;
        }
        .botonMenu:hover { background: rgba(0, 255, 0, 0.4); box-shadow: 0 0 20px #00ff00; }
        .botonMenu:disabled { opacity: 0.5; cursor: not-allowed; }
        #bloqueo {
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.8);
            display: none; flex-direction: column; justify-content: center; align-items: center;
            color: white; z-index: 20; text-align: center;
        }
        #mira {
            position: absolute; top: 50%; left: 50%; width: 14px; height: 14px; border: 2px solid #00ff00;
            border-radius: 50%; transform: translate(-50%, -50%); z-index: 10; pointer-events: none; display: none;
        }
        #hud {
            position: absolute; bottom: 15px; left: 15px; color: #00ff00; font-size: 1.5rem; display: none;
            text-shadow: 2px 2px #000; font-weight: bold; pointer-events: none;
        }
        #pantallaRoja {
            position: absolute; width: 100%; height: 100%; background: red; opacity: 0; pointer-events: none; z-index: 5;
            transition: opacity 0.2s; display: none;
        }
    </style>
</head>
<body>
    <div id="menuInicio">
        <h1 id="tituloMenu">NEXUS FPS: SURVIVAL</h1>
        <p id="estadoCarga" style="color: #00ff00;">Descargando oscuridad...</p>
        <button id="btnIniciar" class="botonMenu" disabled>ENTRAR AL BOSQUE</button>
    </div>
    <div id="bloqueo">
        <h1 id="textoPausa">PAUSA</h1>
        <button id="btnContinuar" class="botonMenu">VOLVER</button>
        <button id="btnSalir" class="botonMenu" style="border-color: red; color: red;">SALIR</button>
    </div>
    <div id="pantallaRoja"></div>
    <div id="mira"></div>
    <div id="hud">
        HP: <span id="uiVida">100</span> | 
        HORDA: <span id="uiHorda">1</span> | 
        ZOMBIES: <span id="uiZombies">15</span>
        <br><span style="font-size: 0.8rem;">[F] LINTERNA | [E] CURAR | [V] CAMBIAR CÁMARA (1ra/3ra)</span>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "fflate": "https://unpkg.com/fflate@0.8.2/esm/browser.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
        import * as SkeletonUtils from 'three/addons/utils/SkeletonUtils.js';

        // --- ENTORNO Y NIEBLA NOCTURNA (RESTURADO) ---
        const escena = new THREE.Scene();
        escena.background = new THREE.Color(0x0a0a10); // Cielo oscuro
        escena.fog = new THREE.FogExp2(0x0a0a10, 0.06); // Niebla densa negra/azulada

        // --- SISTEMA DE DOBLE CÁMARA (Para evitar bugs de movimiento) ---
        const camaraControles = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const camaraRender = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderizador = new THREE.WebGLRenderer({ antialias: true });
        renderizador.setSize(window.innerWidth, window.innerHeight);
        renderizador.shadowMap.enabled = true;
        document.body.appendChild(renderizador.domElement);

        escena.add(new THREE.HemisphereLight(0x222233, 0x111122, 0.5)); // Luz ambiente baja
        const luna = new THREE.DirectionalLight(0x5555aa, 0.3); // Luz de luna tenue
        luna.position.set(20, 50, -20); luna.castShadow = true; escena.add(luna);

        const loaderTex = new THREE.TextureLoader();
        const texPiso = loaderTex.load('https://cdn.polyhaven.com/asset_img/primary/aerial_grass_rock.png?height=760&quality=95');
        texPiso.wrapS = texPiso.wrapT = THREE.RepeatWrapping; texPiso.repeat.set(30, 30);
        const piso = new THREE.Mesh(new THREE.PlaneGeometry(150, 150), new THREE.MeshStandardMaterial({ map: texPiso, color: 0x333333 }));
        piso.rotation.x = -Math.PI / 2; piso.receiveShadow = true; escena.add(piso);

        // --- GENERADOR DE BOSQUE ---
        function generarEntorno() {
            const geoTronco = new THREE.CylinderGeometry(0.6, 0.8, 4, 8);
            const matTronco = new THREE.MeshStandardMaterial({color: 0x1a0f0a}); 
            const geoHojas = new THREE.ConeGeometry(3, 7, 8);
            const matHojas = new THREE.MeshStandardMaterial({color: 0x0a1a0a}); 

            for(let i=0; i<100; i++) {
                const x = (Math.random() - 0.5) * 140; const z = (Math.random() - 0.5) * 140;
                if(Math.abs(x) < 10 && Math.abs(z) < 10) continue; 
                const tronco = new THREE.Mesh(geoTronco, matTronco); tronco.position.set(x, 2, z); escena.add(tronco);
                const hojas = new THREE.Mesh(geoHojas, matHojas); hojas.position.set(x, 7.5, z); escena.add(hojas);
            }
            const geoAuto = new THREE.BoxGeometry(2.5, 1.2, 5);
            for(let i=0; i<15; i++) {
                const x = (Math.random() - 0.5) * 120; const z = (Math.random() - 0.5) * 120;
                if(Math.abs(x) < 15 && Math.abs(z) < 15) continue; 
                const auto = new THREE.Mesh(geoAuto, new THREE.MeshStandardMaterial({color: 0x3c1b1b})); auto.position.set(x, 0.6, z); auto.rotation.y = Math.random() * Math.PI; escena.add(auto);
            }
        }
        generarEntorno(); 

        // --- SISTEMA DEL JUEGO ---
        let jugador = { vida: 100, maxVida: 100 };
        let sistemaHordas = { nivel: 1, zombiesRestantes: 15, zombiesTotales: 15, multiplicadorVidaZombie: 1, velocidadZombie: 0.04 };
        let datosZombiesGrupales = [];

        // Modelos
        let mezcladorIdle, mezcladorRun; let modeloIdle, modeloRun; 
        let modeloTP; let mixerTP; let accionesTP = {}; 
        let esTerceraPersona = false; // Variable mágica para la tecla V

        const listaBotiquines = [];
        let enemigos = [];
        const reloj = new THREE.Clock(); const fbxLoader = new FBXLoader();
        let juegoListo = false; let juegoEmpezado = false; let gameOver = false;

        const controles = new PointerLockControls(camaraControles, document.body);
        
        btnIniciar.addEventListener('click', () => {
            menuInicio.style.display = 'none'; mira.style.display = 'block'; hud.style.display = 'block'; pantallaRoja.style.display = 'block';
            controles.lock(); juegoEmpezado = true;
        });
        btnContinuar.addEventListener('click', () => { if(!gameOver) controles.lock(); });
        btnSalir.addEventListener('click', () => { location.reload(); });
        controles.addEventListener('lock', () => bloqueo.style.display = 'none');
        controles.addEventListener('unlock', () => { if(juegoEmpezado) bloqueo.style.display = 'flex'; });

        const teclas = { w:false, a:false, s:false, d:false }; let velY = 0, enSuelo = true;
        document.addEventListener('keydown', e => {
            if(!controles.isLocked || !juegoEmpezado || gameOver) return;
            if(teclas.hasOwnProperty(e.key.toLowerCase())) teclas[e.key.toLowerCase()] = true;
            if(e.code === 'Space' && enSuelo) { velY = 0.25; enSuelo = false; }
            if(e.code === 'KeyE') curarJugador();
            if(e.code === 'KeyV') esTerceraPersona = !esTerceraPersona; // Aquí cambiamos de cámara
        });
        document.addEventListener('keyup', e => { if(teclas.hasOwnProperty(e.key.toLowerCase())) teclas[e.key.toLowerCase()] = false; });

        function actualizarHUD() {
            uiVida.innerText = Math.max(0, Math.floor(jugador.vida));
            uiHorda.innerText = sistemaHordas.nivel;
            uiZombies.innerText = sistemaHordas.zombiesRestantes;
            if(jugador.vida <= 0 && !gameOver) {
                gameOver = true; controles.unlock();
                textoPausa.innerText = "¡TE COMIERON!"; textoPausa.style.color = "red";
                btnContinuar.style.display = "none"; bloqueo.style.display = 'flex';
            }
        }

        const cargarFBX = (url) => new Promise((resolve, reject) => { fbxLoader.load(url, resolve, undefined, (err) => reject({url, err})); });

        function crearZombie(tipoElegido) {
            const clonMesh = SkeletonUtils.clone(tipoElegido.modeloBase);
            clonMesh.position.set((Math.random() - 0.5) * 120, 0, (Math.random() - 0.5) * 120);
            clonMesh.radioH = 1.0; escena.add(clonMesh);
            const mixer = new THREE.AnimationMixer(clonMesh);
            const acciones = { walk: mixer.clipAction(tipoElegido.animaciones.walk), attack: mixer.clipAction(tipoElegido.animaciones.attack), death: mixer.clipAction(tipoElegido.animaciones.death) };
            acciones.death.setLoop(THREE.LoopOnce); acciones.death.clampWhenFinished = true; acciones.walk.play();
            enemigos.push({
                mesh: clonMesh, mixer: mixer, acciones: acciones, estado: 'walk', vida: 3 * sistemaHordas.multiplicadorVidaZombie,
                cambiarEstado: function(nuevoEstado) {
                    if(this.estado === nuevoEstado || this.estado === 'dead') return;
                    if (nuevoEstado === 'dead') { this.acciones.walk.stop(); this.acciones.attack.stop(); this.acciones.death.reset().play(); }
                    else { this.acciones[this.estado].fadeOut(0.2); this.acciones[nuevoEstado].reset().fadeIn(0.2).play(); }
                    this.estado = nuevoEstado;
                }
            });
        }

        function crearBotiquin(x, z) {
            const geoCaja = new THREE.BoxGeometry(0.5, 0.4, 0.2);
            const matRoja = new THREE.MeshStandardMaterial({color: 0xff0000});
            const caja = new THREE.Mesh(geoCaja, matRoja); caja.position.set(x, 0.2, z); caja.castShadow = true; escena.add(caja);
            const geoCrossH = new THREE.BoxGeometry(0.1, 0.3, 0.05); const geoCrossV = new THREE.BoxGeometry(0.3, 0.1, 0.05);
            const matBlanca = new THREE.MeshStandardMaterial({color: 0xffffff});
            const crossH = new THREE.Mesh(geoCrossH, matBlanca); const crossV = new THREE.Mesh(geoCrossV, matBlanca);
            crossH.position.set(0, 0, 0.11); crossV.position.set(0, 0, 0.11); caja.add(crossH); caja.add(crossV);
            const luz = new THREE.PointLight(0xffcccc, 0.5, 2); luz.position.set(0, 0.2, 0); caja.add(luz);
            listaBotiquines.push(caja);
        }

        function curarJugador() {
            if(jugador.vida < 100) { jugador.vida = Math.min(100, jugador.vida + 50); actualizarHUD(); }
        }

        async function iniciarCarga() {
            try {
                const escalaNormal = 0.007; 
                const escalaArmaFPS = 0.0005; 
                estadoCarga.innerText = "Cargando mundo y zombies...";

                // 1. Armas 1ra persona
                modeloIdle = await cargarFBX('./Rifle Idle.fbx');
                modeloRun = await cargarFBX('./correr.fbx');
                [modeloIdle, modeloRun].forEach(m => { m.scale.set(escalaArmaFPS, escalaArmaFPS, escalaArmaFPS); escena.add(m); });
                modeloRun.visible = false;
                if(modeloIdle.animations.length) { mezcladorIdle = new THREE.AnimationMixer(modeloIdle); mezcladorIdle.clipAction(modeloIdle.animations[0]).play(); }
                if(modeloRun.animations.length) { mezcladorRun = new THREE.AnimationMixer(modeloRun); mezcladorRun.clipAction(modeloRun.animations[0]).play(); }

                // 2. Personaje 3ra persona (El tuyo real)
                const tpIdleModel = await cargarFBX('./Rifle Idle.fbx');
                const tpRunModel = await cargarFBX('./correr.fbx');
                modeloTP = tpIdleModel;
                modeloTP.scale.set(escalaNormal, escalaNormal, escalaNormal); 
                modeloTP.visible = false; // Empieza oculto porque inicias en 1ra persona
                modeloTP.traverse(n => { if(n.isMesh) n.castShadow = true; }); 
                escena.add(modeloTP);
                
                mixerTP = new THREE.AnimationMixer(modeloTP);
                accionesTP.idle = mixerTP.clipAction(tpIdleModel.animations[0]);
                accionesTP.run = mixerTP.clipAction(tpRunModel.animations[0]); 
                accionesTP.idle.play(); 

                // 3. Zombies
                const nombresZombies = [
                    { walk: './Z1_Walk.fbx', attack: './Z1_attack.fbx', death: './Z1_Death.fbx' },
                    { walk: './Z2_Walk.fbx', attack: './Z2_attack.fbx', death: './Z2_Death.fbx' },
                    { walk: './Z3_walk.fbx', attack: './Z3_attack.fbx', death: './Z3-Death.fbx' }
                ];
                for(let i=0; i<nombresZombies.length; i++) {
                    const w = await cargarFBX(nombresZombies[i].walk); const a = await cargarFBX(nombresZombies[i].attack); const d = await cargarFBX(nombresZombies[i].death);
                    w.scale.set(escalaNormal, escalaNormal, escalaNormal);
                    datosZombiesGrupales.push({ modeloBase: w, animaciones: { walk: w.animations[0], attack: a.animations[0], death: d.animations[0] } });
                }
                for(let i=0; i<sistemaHordas.zombiesTotales; i++) { crearZombie(datosZombiesGrupales[Math.floor(Math.random() * datosZombiesGrupales.length)]); }

                // 4. Botiquines
                for(let i=0; i<5; i++) crearBotiquin((Math.random() - 0.5) * 100, (Math.random() - 0.5) * 100);

                estadoCarga.innerText = "¡PREPARADO!"; btnIniciar.disabled = false; juegoListo = true;
            } catch (error) { console.error(error); estadoCarga.innerText = "ERROR AL CARGAR DATOS."; }
        }
        iniciarCarga();

        const ray = new THREE.Raycaster();
        const matDisparo = new THREE.LineBasicMaterial({ color: 0xffaa00, linewidth: 2, transparent: true, opacity: 1 });
        
        window.addEventListener('mousedown', () => {
            if(!controles.isLocked || !juegoListo || !juegoEmpezado || gameOver) return;
            // El disparo siempre sale desde la cámara real del jugador, incluso en 3ra persona
            ray.setFromCamera(new THREE.Vector2(0, 0), camaraControles);
            const objetivoBala = new THREE.Vector3(); ray.ray.at(100, objetivoBala); 
            const meshesVivos = enemigos.filter(z => z.estado !== 'dead').map(z => z.mesh);
            const hits = ray.intersectObjects(meshesVivos, true); 
            
            if(hits.length > 0) {
                objetivoBala.copy(hits[0].point); let objetivo = hits[0].object;
                while(objetivo.parent && objetivo.parent.type !== 'Scene') { objetivo = objetivo.parent; }
                const zombieAtacado = enemigos.find(z => z.mesh === objetivo);
                if(zombieAtacado) { 
                    zombieAtacado.vida -= 1;
                    if(zombieAtacado.vida <= 0) {
                        zombieAtacado.cambiarEstado('dead'); sistemaHordas.zombiesRestantes--; actualizarHUD();
                        if(sistemaHordas.zombiesRestantes <= 0) {
                            setTimeout(() => { sistemaHordas.nivel++; sistemaHordas.zombiesTotales += 5; sistemaHordas.zombiesRestantes = sistemaHordas.zombiesTotales; sistemaHordas.multiplicadorVidaZombie += 0.5; sistemaHordas.velocidadZombie += 0.005; for(let i=0; i<sistemaHordas.zombiesTotales; i++) { crearZombie(datosZombiesGrupales[Math.floor(Math.random() * datosZombiesGrupales.length)]); } actualizarHUD(); }, 3000); 
                        }
                    }
                }
            }
            if (modeloIdle && !esTerceraPersona) {
                const puntoDisparo = new THREE.Vector3(); puntoDisparo.setFromMatrixPosition(modeloIdle.matrixWorld); 
                const geoDisparo = new THREE.BufferGeometry().setFromPoints([puntoDisparo, objetivoBala]);
                const rastro = new THREE.Line(geoDisparo, matDisparo.clone()); escena.add(rastro);
                setTimeout(() => { escena.remove(rastro); rastro.material.dispose(); geoDisparo.dispose(); }, 60);
            }
        });

        let estadoTPActual = 'idle';
        function cambiarAnimacionTP(nuevoEstado) {
            if(nuevoEstado === estadoTPActual) return;
            accionesTP[estadoTPActual].fadeOut(0.2);
            accionesTP[nuevoEstado].reset().fadeIn(0.2).play();
            estadoTPActual = nuevoEstado;
        }

        function animar() {
            requestAnimationFrame(animar);
            const delta = reloj.getDelta();
            
            if(juegoEmpezado && !gameOver && controles.isLocked) {
                if(mezcladorIdle) mezcladorIdle.update(delta);
                if(mezcladorRun) mezcladorRun.update(delta);
                if(mixerTP) mixerTP.update(delta);

                const moviendose = teclas.w || teclas.s || teclas.a || teclas.d;
                
                if(teclas.w) controles.moveForward(0.15); if(teclas.s) controles.moveForward(-0.15);
                if(teclas.a) controles.moveRight(-0.12); if(teclas.d) controles.moveRight(0.12);
                
                camaraControles.position.y += velY; if(!enSuelo) velY -= 0.015;
                if(camaraControles.position.y <= 1.6) { camaraControles.position.y = 1.6; velY = 0; enSuelo = true; } 

                const euler = new THREE.Euler(0,0,0,'YXZ').setFromQuaternion(camaraControles.quaternion);

                // --- MAGIA DE LA CÁMARA (1ra vs 3ra Persona) ---
                // Igualamos la cámara visual a la cámara física
                camaraRender.position.copy(camaraControles.position);
                camaraRender.quaternion.copy(camaraControles.quaternion);

                if(esTerceraPersona) {
                    // Si presionaste V: Movemos la cámara visual hacia atrás y arriba
                    camaraRender.translateZ(3.5); 
                    camaraRender.position.y += 0.5;
                    
                    if(modeloTP) {
                        modeloTP.visible = true;
                        const posPies = camaraControles.position.clone(); posPies.y = 0;
                        modeloTP.position.copy(posPies);
                        modeloTP.rotation.y = euler.y + Math.PI;
                        if(moviendose && enSuelo) cambiarAnimacionTP('run'); else cambiarAnimacionTP('idle');
                    }
                    // Ocultamos los brazos
                    if(modeloIdle) modeloIdle.visible = false;
                    if(modeloRun) modeloRun.visible = false;
                } else {
                    // Primera Persona normal
                    if(modeloTP) modeloTP.visible = false;
                    if(modeloIdle && modeloRun) {
                        const fpsOffset = new THREE.Vector3(0.3, -0.4, -0.6); 
                        const finalPos = camaraControles.position.clone().add(fpsOffset.applyAxisAngle(new THREE.Vector3(0,1,0), euler.y));
                        modeloIdle.position.copy(finalPos); modeloIdle.rotation.y = euler.y + Math.PI;
                        modeloRun.position.copy(finalPos); modeloRun.rotation.y = euler.y + Math.PI;
                        modeloIdle.visible = !moviendose || !enSuelo; 
                        modeloRun.visible = moviendose && enSuelo;
                    }
                }

                // Botiquines
                for(let i=listaBotiquines.length - 1; i>=0; i--) {
                    if(jugador.vida < 100 && camaraControles.position.distanceTo(listaBotiquines[i].position) < 1.0) {
                        curarJugador(); escena.remove(listaBotiquines[i]); listaBotiquines.splice(i, 1);
                    }
                }

                // Zombies
                const logicalPlayerPos = camaraControles.position.clone(); logicalPlayerPos.y = 0; 
                let recibiendoDano = false;
                for(let z of enemigos) {
                    z.mixer.update(delta); if(z.estado === 'dead') continue;
                    z.mesh.lookAt(logicalPlayerPos);
                    if(z.mesh.position.distanceTo(logicalPlayerPos) > 2.5) { 
                        z.mesh.translateZ(sistemaHordas.velocidadZombie); z.cambiarEstado('walk'); 
                    } else { 
                        z.cambiarEstado('attack'); jugador.vida -= 0.2; recibiendoDano = true; actualizarHUD(); 
                    }
                }
                pantallaRoja.style.opacity = recibiendoDano ? "0.3" : "0";
            }
            
            // Renderizamos solo la cámara principal (Ya no hay mini pantallas divididas)
            renderizador.render(escena, camaraRender);
        }
        animar();

        window.addEventListener('resize', () => { 
            camaraControles.aspect = window.innerWidth / window.innerHeight; camaraControles.updateProjectionMatrix(); 
            camaraRender.aspect = window.innerWidth / window.innerHeight; camaraRender.updateProjectionMatrix(); 
            renderizador.setSize(window.innerWidth, window.innerHeight); 
        });
    </script>
</body>
</html>
