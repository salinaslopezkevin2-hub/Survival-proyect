<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus FPS - Pro Anim</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #bloqueo {
            position: absolute; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; cursor: pointer; z-index: 20; text-align: center;
        }
        #mira {
            position: absolute; top: 50%; left: 50%;
            width: 14px; height: 14px; border: 2px solid #00ff00;
            border-radius: 50%; transform: translate(-50%, -50%);
            z-index: 10; pointer-events: none;
        }
        #hud {
            position: absolute; bottom: 20px; left: 20px;
            color: #00ff00; font-family: monospace; font-size: 1.5rem;
            text-shadow: 2px 2px #000; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="bloqueo">
        <h1>NEXUS FPS</h1>
        <p>CLIC PARA COMBATIR</p>
    </div>
    <div id="mira"></div>
    <div id="hud">ARMA: RIFLE BÁSICO</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const escena = new THREE.Scene();
        escena.background = new THREE.Color(0x87ceeb);
        escena.fog = new THREE.Fog(0x87ceeb, 0, 70);

        const camara = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderizador = new THREE.WebGLRenderer({ antialias: true });
        renderizador.setSize(window.innerWidth, window.innerHeight);
        renderizador.shadowMap.enabled = true;
        document.body.appendChild(renderizador.domElement);

        escena.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1));
        const sol = new THREE.DirectionalLight(0xffffff, 0.8);
        sol.position.set(10, 20, 10);
        sol.castShadow = true;
        escena.add(sol);

        // --- PISO Y ENEMIGOS ---
        const loaderTex = new THREE.TextureLoader();
        const texPiso = loaderTex.load('https://cdn.polyhaven.com/asset_img/primary/rocky_terrain_02.png?height=760&quality=95');
        texPiso.wrapS = texPiso.wrapT = THREE.RepeatWrapping;
        texPiso.repeat.set(20, 20);
        const piso = new THREE.Mesh(new THREE.PlaneGeometry(120, 120), new THREE.MeshStandardMaterial({ map: texPiso }));
        piso.rotation.x = -Math.PI / 2;
        piso.receiveShadow = true;
        escena.add(piso);

        const enemigos = [];
        const geoTronco = new THREE.CylinderGeometry(1, 1, 4, 12);
        const texMadera = loaderTex.load('https://cdn.polyhaven.com/asset_img/primary/bark_willow_02.png?height=760&quality=95');
        const matMadera = new THREE.MeshStandardMaterial({ map: texMadera });

        for(let i=0; i<25; i++) {
            const tronco = new THREE.Mesh(geoTronco, matMadera);
            tronco.position.set((Math.random()-0.5)*90, 2, (Math.random()-0.5)*90);
            tronco.castShadow = true;
            tronco.radioH = 1.3; 
            escena.add(tronco);
            enemigos.push(tronco);
        }

        // --- SISTEMA DE ANIMACIÓN ---
        let mezcladorIdle, mezcladorRun;
        let modeloIdle, modeloRun;
        const reloj = new THREE.Clock();
        const loader = new GLTFLoader();

        // Cargar IDLE
        loader.load('./idle.glb', (gltf) => {
            modeloIdle = gltf.scene;
            modeloIdle.scale.set(0.01, 0.01, 0.01);
            modeloIdle.traverse(n => { if(n.isMesh) n.castShadow = true; });
            escena.add(modeloIdle);
            mezcladorIdle = new THREE.AnimationMixer(modeloIdle);
            mezcladorIdle.clipAction(gltf.animations[0]).play();
        });

        // Cargar RUN
        loader.load('./correr.glb', (gltf) => {
            modeloRun = gltf.scene;
            modeloRun.scale.set(0.01, 0.01, 0.01);
            modeloRun.traverse(n => { if(n.isMesh) n.castShadow = true; });
            modeloRun.visible = false; // Oculto al inicio
            escena.add(modeloRun);
            mezcladorRun = new THREE.AnimationMixer(modeloRun);
            mezcladorRun.clipAction(gltf.animations[0]).play();
        });

        // --- CONTROLES ---
        const controles = new PointerLockControls(camara, document.body);
        document.getElementById('bloqueo').addEventListener('click', () => controles.lock());
        controles.addEventListener('lock', () => document.getElementById('bloqueo').style.display = 'none');
        controles.addEventListener('unlock', () => document.getElementById('bloqueo').style.display = 'flex');

        const teclas = { w:false, a:false, s:false, d:false };
        let velY = 0;
        let enSuelo = true;

        document.addEventListener('keydown', e => {
            if(teclas.hasOwnProperty(e.key.toLowerCase())) teclas[e.key.toLowerCase()] = true;
            if(e.code === 'Space' && enSuelo) { velY = 0.25; enSuelo = false; }
        });
        document.addEventListener('keyup', e => {
            if(teclas.hasOwnProperty(e.key.toLowerCase())) teclas[e.key.toLowerCase()] = false;
        });

        // --- DISPARO ---
        const ray = new THREE.Raycaster();
        window.addEventListener('mousedown', () => {
            if(!controles.isLocked) return;
            ray.setFromCamera(new THREE.Vector2(0, 0), camara);
            const hits = ray.intersectObjects(enemigos);
            if(hits.length > 0) {
                escena.remove(hits[0].object);
                enemigos.splice(enemigos.indexOf(hits[0].object), 1);
            }
        });

        function animar() {
            requestAnimationFrame(animar);
            const delta = reloj.getDelta();
            if(mezcladorIdle) mezcladorIdle.update(delta);
            if(mezcladorRun) mezcladorRun.update(delta);

            if(controles.isLocked) {
                const prevPos = camara.position.clone();
                const moviendose = teclas.w || teclas.s || teclas.a || teclas.d;

                if(teclas.w) controles.moveForward(0.15);
                if(teclas.s) controles.moveForward(-0.15);
                if(teclas.a) controles.moveRight(-0.12);
                if(teclas.d) controles.moveRight(0.12);

                camara.position.y += velY;
                if(!enSuelo) velY -= 0.015;
                if(camara.position.y <= 1.6) { camara.position.y = 1.6; velY = 0; enSuelo = true; }

                // Lógica de cambio de mono (Hitbut de animación)
                if(modeloIdle && modeloRun) {
                    const euler = new THREE.Euler(0,0,0,'YXZ').setFromQuaternion(camara.quaternion);
                    const offset = new THREE.Vector3(0.7, -1.6, -2.5).applyAxisAngle(new THREE.Vector3(0,1,0), euler.y);
                    const finalPos = camara.position.clone().add(offset);

                    // Posicionar ambos
                    modeloIdle.position.copy(finalPos);
                    modeloIdle.rotation.y = euler.y + Math.PI;
                    modeloRun.position.copy(finalPos);
                    modeloRun.rotation.y = euler.y + Math.PI;

                    // Intercambiar visibilidad
                    if(moviendose && enSuelo) {
                        modeloIdle.visible = false;
                        modeloRun.visible = true;
                    } else {
                        modeloIdle.visible = true;
                        modeloRun.visible = false;
                    }

                    // Colisión
                    for(let t of enemigos) {
                        const dist = modeloIdle.position.distanceTo(new THREE.Vector3(t.position.x, modeloIdle.position.y, t.position.z));
                        if(dist < t.radioH) {
                            camara.position.copy(prevPos);
                        }
                    }
                }
            }
            renderizador.render(escena, camara);
        }
        animar();

        window.addEventListener('resize', () => {
            camara.aspect = window.innerWidth / window.innerHeight;
            camara.updateProjectionMatrix();
            renderizador.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
