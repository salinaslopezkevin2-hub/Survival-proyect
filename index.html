<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus FPS - Zombies & Hordas (v5)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', Courier, monospace; }
        
        /* MENÚ DE INICIO */
        #menuInicio {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), 
                        url('https://cdn.polyhaven.com/asset_img/primary/rocky_terrain_02.png?height=760&quality=95');
            background-size: cover;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #00ff00; z-index: 100; text-align: center; text-shadow: 0 0 10px #00ff00;
        }
        #tituloMenu { font-size: 4rem; margin-bottom: 10px; }
        .botonMenu {
            background: rgba(0, 255, 0, 0.1); border: 2px solid #00ff00; color: #00ff00;
            padding: 15px 40px; font-size: 1.5rem; cursor: pointer; margin: 10px;
            transition: all 0.3s; font-family: inherit; font-weight: bold;
        }
        .botonMenu:hover { background: rgba(0, 255, 0, 0.4); box-shadow: 0 0 20px #00ff00; }
        .botonMenu:disabled { opacity: 0.5; cursor: not-allowed; }

        /* PAUSA Y GAMEOVER */
        #bloqueo {
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.8);
            display: none; flex-direction: column; justify-content: center; align-items: center;
            color: white; z-index: 20; text-align: center;
        }
        
        /* HUD EN JUEGO */
        #mira {
            position: absolute; top: 50%; left: 50%;
            width: 14px; height: 14px; border: 2px solid #00ff00;
            border-radius: 50%; transform: translate(-50%, -50%);
            z-index: 10; pointer-events: none; display: none;
        }
        #hud {
            position: absolute; bottom: 20px; left: 20px;
            color: #00ff00; font-size: 1.5rem; display: none;
            text-shadow: 2px 2px #000; font-weight: bold; pointer-events: none;
        }
        #pantallaRoja {
            position: absolute; width: 100%; height: 100%;
            background: red; opacity: 0; pointer-events: none; z-index: 5;
            transition: opacity 0.2s; display: none;
        }
    </style>
</head>
<body>
    <div id="menuInicio">
        <h1 id="tituloMenu">NEXUS FPS: SURVIVAL</h1>
        <p id="estadoCarga">Descargando armas y zombies...</p>
        <button id="btnIniciar" class="botonMenu" disabled>INICIAR PARTIDA</button>
        <button class="botonMenu" style="opacity: 0.5;">MEJORAR ARMAS (Próximamente)</button>
    </div>

    <div id="bloqueo">
        <h1 id="textoPausa">PAUSA</h1>
        <button id="btnContinuar" class="botonMenu">VOLVER AL JUEGO</button>
        <button id="btnSalir" class="botonMenu" style="border-color: red; color: red;">ABANDONAR AL MENÚ PRINCIPAL</button>
    </div>

    <div id="pantallaRoja"></div>
    <div id="mira"></div>
    <div id="hud">HP: <span id="uiVida">100</span> | HORDA: <span id="uiHorda">1</span> | ZOMBIES: <span id="uiZombies">15</span></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "fflate": "https://unpkg.com/fflate@0.8.2/esm/browser.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
        import * as SkeletonUtils from 'three/addons/utils/SkeletonUtils.js';

        // --- CONFIGURACIÓN BÁSICA ---
        const escena = new THREE.Scene();
        escena.background = new THREE.Color(0x87ceeb);
        escena.fog = new THREE.Fog(0x87ceeb, 0, 70);

        const camara = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderizador = new THREE.WebGLRenderer({ antialias: true });
        renderizador.setSize(window.innerWidth, window.innerHeight);
        renderizador.shadowMap.enabled = true;
        document.body.appendChild(renderizador.domElement);

        escena.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1));
        const sol = new THREE.DirectionalLight(0xffffff, 0.8); sol.position.set(10, 20, 10); sol.castShadow = true; escena.add(sol);

        const loaderTex = new THREE.TextureLoader();
        const texPiso = loaderTex.load('https://cdn.polyhaven.com/asset_img/primary/rocky_terrain_02.png?height=760&quality=95');
        texPiso.wrapS = texPiso.wrapT = THREE.RepeatWrapping; texPiso.repeat.set(20, 20);
        const piso = new THREE.Mesh(new THREE.PlaneGeometry(120, 120), new THREE.MeshStandardMaterial({ map: texPiso }));
        piso.rotation.x = -Math.PI / 2; piso.receiveShadow = true; escena.add(piso);

        // --- SISTEMA DEL JUEGO (NUEVO) ---
        let jugador = { vida: 100, maxVida: 100 };
        let sistemaHordas = { nivel: 1, zombiesRestantes: 15, zombiesTotales: 15, multiplicadorVidaZombie: 1, velocidadZombie: 0.04 };
        let datosZombiesGrupales = []; // Guarda los modelos para clonarlos en nuevas hordas

        let mezcladorIdle, mezcladorRun; let modeloIdle, modeloRun;
        let enemigos = [];
        const reloj = new THREE.Clock(); const fbxLoader = new FBXLoader();
        let juegoListo = false; let juegoEmpezado = false; let gameOver = false;

        const controles = new PointerLockControls(camara, document.body);
        
        // INTERFAZ
        document.getElementById('btnIniciar').addEventListener('click', () => {
            document.getElementById('menuInicio').style.display = 'none';
            document.getElementById('mira').style.display = 'block';
            document.getElementById('hud').style.display = 'block';
            document.getElementById('pantallaRoja').style.display = 'block';
            controles.lock(); juegoEmpezado = true;
        });

        document.getElementById('btnContinuar').addEventListener('click', () => { if(!gameOver) controles.lock(); });
        document.getElementById('btnSalir').addEventListener('click', () => { location.reload(); }); // Recarga la página (Vuelve al menú)

        controles.addEventListener('lock', () => document.getElementById('bloqueo').style.display = 'none');
        controles.addEventListener('unlock', () => { 
            if(juegoEmpezado) document.getElementById('bloqueo').style.display = 'flex'; 
        });

        const teclas = { w:false, a:false, s:false, d:false }; let velY = 0, enSuelo = true;
        document.addEventListener('keydown', e => {
            if(!controles.isLocked || !juegoEmpezado || gameOver) return;
            if(teclas.hasOwnProperty(e.key.toLowerCase())) teclas[e.key.toLowerCase()] = true;
            if(e.code === 'Space' && enSuelo) { velY = 0.25; enSuelo = false; }
        });
        document.addEventListener('keyup', e => { if(teclas.hasOwnProperty(e.key.toLowerCase())) teclas[e.key.toLowerCase()] = false; });

        function actualizarHUD() {
            document.getElementById('uiVida').innerText = Math.max(0, Math.floor(jugador.vida));
            document.getElementById('uiHorda').innerText = sistemaHordas.nivel;
            document.getElementById('uiZombies').innerText = sistemaHordas.zombiesRestantes;
            
            if(jugador.vida <= 0 && !gameOver) {
                gameOver = true; controles.unlock();
                document.getElementById('textoPausa').innerText = "¡ESTÁS MUERTO!";
                document.getElementById('textoPausa').style.color = "red";
                document.getElementById('btnContinuar').style.display = "none";
                document.getElementById('bloqueo').style.display = 'flex';
            }
        }

        const cargarFBX = (url) => new Promise((resolve, reject) => { fbxLoader.load(url, resolve, undefined, (err) => reject({url, err})); });

        // --- GENERADOR DE ZOMBIES ---
        function crearZombie(tipoElegido) {
            const clonMesh = SkeletonUtils.clone(tipoElegido.modeloBase);
            clonMesh.position.set((Math.random() - 0.5) * 90, 0, (Math.random() - 0.5) * 90);
            clonMesh.radioH = 1.0; escena.add(clonMesh);

            const mixer = new THREE.AnimationMixer(clonMesh);
            const acciones = {
                walk: mixer.clipAction(tipoElegido.animaciones.walk),
                attack: mixer.clipAction(tipoElegido.animaciones.attack),
                death: mixer.clipAction(tipoElegido.animaciones.death)
            };
            acciones.death.setLoop(THREE.LoopOnce); acciones.death.clampWhenFinished = true;
            acciones.walk.play();

            enemigos.push({
                mesh: clonMesh, mixer: mixer, acciones: acciones, estado: 'walk',
                vida: 3 * sistemaHordas.multiplicadorVidaZombie, // Vida del zombie según la horda
                cambiarEstado: function(nuevoEstado) {
                    if(this.estado === nuevoEstado || this.estado === 'dead') return;
                    if (nuevoEstado === 'dead') {
                        this.acciones.walk.stop(); this.acciones.attack.stop();
                        this.acciones.death.reset().play();
                    } else {
                        this.acciones[this.estado].fadeOut(0.2);
                        this.acciones[nuevoEstado].reset().fadeIn(0.2).play();
                    }
                    this.estado = nuevoEstado;
                }
            });
        }

        async function iniciarCarga() {
            try {
                const estadoCarga = document.getElementById('estadoCarga');
                modeloIdle = await cargarFBX('./Rifle Idle.fbx'); modeloRun = await cargarFBX('./correr.fbx');
                [modeloIdle, modeloRun].forEach(m => { m.scale.set(0.01, 0.01, 0.01); escena.add(m); });
                modeloRun.visible = false;
                
                if(modeloIdle.animations.length) { mezcladorIdle = new THREE.AnimationMixer(modeloIdle); mezcladorIdle.clipAction(modeloIdle.animations[0]).play(); }
                if(modeloRun.animations.length) { mezcladorRun = new THREE.AnimationMixer(modeloRun); mezcladorRun.clipAction(modeloRun.animations[0]).play(); }

                const nombresZombies = [
                    { walk: './Z1_Walk.fbx', attack: './Z1_attack.fbx', death: './Z1_Death.fbx' },
                    { walk: './Z2_Walk.fbx', attack: './Z2_attack.fbx', death: './Z2_Death.fbx' },
                    { walk: './Z3_walk.fbx', attack: './Z3_attack.fbx', death: './Z3-Death.fbx' }
                ];

                for(let i=0; i<nombresZombies.length; i++) {
                    estadoCarga.innerText = `Cargando Zombie ${i+1} de 3...`;
                    const w = await cargarFBX(nombresZombies[i].walk); const a = await cargarFBX(nombresZombies[i].attack); const d = await cargarFBX(nombresZombies[i].death);
                    w.scale.set(0.007, 0.007, 0.007);
                    datosZombiesGrupales.push({ modeloBase: w, animaciones: { walk: w.animations[0], attack: a.animations[0], death: d.animations[0] } });
                }

                estadoCarga.innerText = "Generando Horda 1...";
                for(let i=0; i<sistemaHordas.zombiesTotales; i++) {
                    crearZombie(datosZombiesGrupales[Math.floor(Math.random() * datosZombiesGrupales.length)]);
                }

                estadoCarga.innerText = "¡TODO LISTO!";
                document.getElementById('btnIniciar').disabled = false;
                juegoListo = true;
            } catch (error) { console.error(error); document.getElementById('estadoCarga').innerText = "ERROR AL CARGAR"; }
        }
        iniciarCarga();

        // --- DISPARO ---
        const ray = new THREE.Raycaster();
        const matDisparo = new THREE.LineBasicMaterial({ color: 0xffaa00, linewidth: 2, transparent: true, opacity: 1 });
        const puntoDisparo = new THREE.Vector3();

        window.addEventListener('mousedown', () => {
            if(!controles.isLocked || !juegoListo || !juegoEmpezado || gameOver) return;

            ray.setFromCamera(new THREE.Vector2(0, 0), camara);
            const objetivoBala = new THREE.Vector3();
            ray.ray.at(100, objetivoBala); 

            const meshesVivos = enemigos.filter(z => z.estado !== 'dead').map(z => z.mesh);
            const hits = ray.intersectObjects(meshesVivos, true); 
            
            if(hits.length > 0) {
                objetivoBala.copy(hits[0].point);
                let objetivo = hits[0].object;
                while(objetivo.parent && objetivo.parent.type !== 'Scene') { objetivo = objetivo.parent; }
                const zombieAtacado = enemigos.find(z => z.mesh === objetivo);
                
                if(zombieAtacado) { 
                    zombieAtacado.vida -= 1; // Le quitamos 1 de vida al zombie
                    if(zombieAtacado.vida <= 0) {
                        zombieAtacado.cambiarEstado('dead');
                        sistemaHordas.zombiesRestantes--;
                        actualizarHUD();
                        
                        // ¿SE ACABÓ LA HORDA?
                        if(sistemaHordas.zombiesRestantes <= 0) {
                            setTimeout(() => {
                                sistemaHordas.nivel++;
                                sistemaHordas.zombiesTotales += 5; // Salen 5 zombies más cada ronda
                                sistemaHordas.zombiesRestantes = sistemaHordas.zombiesTotales;
                                sistemaHordas.multiplicadorVidaZombie += 0.5; // Tienen más vida
                                sistemaHordas.velocidadZombie += 0.005; // Corren más rápido
                                
                                for(let i=0; i<sistemaHordas.zombiesTotales; i++) {
                                    crearZombie(datosZombiesGrupales[Math.floor(Math.random() * datosZombiesGrupales.length)]);
                                }
                                actualizarHUD();
                            }, 3000); // Espera 3 segundos para la siguiente ronda
                        }
                    }
                }
            }

            if (modeloIdle) {
                puntoDisparo.setFromMatrixPosition(modeloIdle.matrixWorld); 
                const geoDisparo = new THREE.BufferGeometry().setFromPoints([puntoDisparo, objetivoBala]);
                const rastro = new THREE.Line(geoDisparo, matDisparo.clone()); 
                escena.add(rastro);
                setTimeout(() => { escena.remove(rastro); rastro.material.dispose(); geoDisparo.dispose(); }, 60);
            }
        });

        // --- BUCLE DE ANIMACIÓN ---
        function animar() {
            requestAnimationFrame(animar);
            const delta = reloj.getDelta();
            
            if(mezcladorIdle) mezcladorIdle.update(delta);
            if(mezcladorRun) mezcladorRun.update(delta);
            
            if(juegoEmpezado && !gameOver) {
                const prevPos = camara.position.clone();
                const moviendose = teclas.w || teclas.s || teclas.a || teclas.d;

                if(controles.isLocked) {
                    if(teclas.w) controles.moveForward(0.15);
                    if(teclas.s) controles.moveForward(-0.15);
                    if(teclas.a) controles.moveRight(-0.12);
                    if(teclas.d) controles.moveRight(0.12);

                    camara.position.y += velY;
                    if(!enSuelo) velY -= 0.015;
                    if(camara.position.y <= 1.6) { camara.position.y = 1.6; velY = 0; enSuelo = true; }

                    // VUELVE LA PRIMERA PERSONA PERFECTA
                    if(modeloIdle && modeloRun) {
                        const euler = new THREE.Euler(0,0,0,'YXZ').setFromQuaternion(camara.quaternion);
                        const finalPos = camara.position.clone().add(new THREE.Vector3(0.5, -1.6, -2.5).applyAxisAngle(new THREE.Vector3(0,1,0), euler.y));
                        
                        modeloIdle.position.copy(finalPos); modeloIdle.rotation.y = euler.y + Math.PI;
                        modeloRun.position.copy(finalPos); modeloRun.rotation.y = euler.y + Math.PI;
                        modeloIdle.visible = !moviendose || !enSuelo; modeloRun.visible = moviendose && enSuelo;

                        for(let z of enemigos) {
                            if(z.estado === 'dead') continue;
                            const dist = camara.position.distanceTo(new THREE.Vector3(z.mesh.position.x, camara.position.y, z.mesh.position.z));
                            if(dist < z.mesh.radioH) camara.position.copy(prevPos);
                        }
                    }
                }

                const posJugadorLogica = camara.position.clone(); posJugadorLogica.y = 0; 
                let recibiendoDano = false;

                for(let z of enemigos) {
                    z.mixer.update(delta);
                    if(z.estado === 'dead') continue;

                    z.mesh.lookAt(posJugadorLogica);
                    const distancia = z.mesh.position.distanceTo(posJugadorLogica);

                    if(distancia > 2.5) {
                        z.mesh.translateZ(sistemaHordas.velocidadZombie); 
                        z.cambiarEstado('walk');
                    } else {
                        z.cambiarEstado('attack');
                        // SI EL ZOMBIE ESTÁ CERCA Y ATACANDO, TE QUITA VIDA
                        jugador.vida -= 0.2; 
                        recibiendoDano = true;
                        actualizarHUD();
                    }
                }
                
                // Efecto visual de sangre en la pantalla
                document.getElementById('pantallaRoja').style.opacity = recibiendoDano ? "0.3" : "0";
            }
            renderizador.render(escena, camara);
        }
        animar();

        window.addEventListener('resize', () => { camara.aspect = window.innerWidth / window.innerHeight; camara.updateProjectionMatrix(); renderizador.setSize(window.innerWidth, window.innerHeight); });
    </script>
</body>
</html>
